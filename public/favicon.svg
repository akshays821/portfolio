<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background with Dark Slate -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="#020617" />
  
  <!-- Gradient Border -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="none" stroke="url(#gradient)" stroke-width="20" opacity="0.8" />
  
  <!-- Stylized A -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" 
        font-family="Arial, sans-serif" font-weight="900" font-size="320" 
        fill="url(#gradient)" filter="url(#glow)">
    A
  </text>
</svg>
